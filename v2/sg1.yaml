# Security Gateway SG1: ConfigMap + Deployment (2 containers) + 2 Services.
# One pod runs both the admin/app port (HTTP, + async worker) and the
# mutual-TLS message port (HTTPS), sharing an emptyDir cert volume. The admin
# container bootstraps the auth cert into /app/certs; the mtls container waits
# for it. SG2 is an identical copy of this file with SG2 values.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sg1-config
data:
  IM_INSTANCE: "GOVSTACK"
  IM_DB_HOST: "mysql"
  IM_DB_PORT: "3306"
  IM_DB_USER: "root"
  IM_DB_PASS: "root"
  IM_CA_URL: "http://ca:9001"
  IM_TSA_URL: "http://tsa:9002"
  IM_GLOBAL_URL: "http://global:9000"
  SG_GATEWAY_CODE: "SG1"
  SG_DB_NAME: "sgateway_sg1_db"
  SG_PORT: "8081"
  SG_MESSAGE_PORT: "8443"
  SG_ADDRESS: "https://sg1-mtls:8443"      # how OTHER gateways reach SG1 (mTLS service DNS)
  SG_MTLS: "true"
  SG_AUTO_APPROVE: "false"
  SG_OWNER_CLASS: "GOV"
  SG_OWNER_CODE: "1001"
  SG_OWNER_NAME: "Ministry of Digital Affairs"
  SG_TITLE: "Security Gateway SG1 (cluster A)"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sg1
  labels: { app: sg1 }
spec:
  replicas: 1
  selector: { matchLabels: { app: sg1 } }
  template:
    metadata: { labels: { app: sg1 } }
    spec:
      volumes:
        - name: certs
          emptyDir: {}
      containers:
        # admin/app port + async worker; bootstraps the auth cert into /app/certs
        - name: admin
          image: msahique/security_gateway_2026:v2
          imagePullPolicy: IfNotPresent
          env:
            - { name: SG_MODE, value: "admin" }
          envFrom:
            - configMapRef: { name: sg1-config }
          ports: [{ containerPort: 8081 }]
          volumeMounts:
            - { name: certs, mountPath: /app/certs }
          readinessProbe:
            httpGet: { path: /openapi.json, port: 8081 }
            initialDelaySeconds: 8
            periodSeconds: 5
        # mutual-TLS message port; waits for the shared auth cert
        - name: mtls
          image: im-security-gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: SG_MODE, value: "mtls" }
          envFrom:
            - configMapRef: { name: sg1-config }
          ports: [{ containerPort: 8443 }]
          volumeMounts:
            - { name: certs, mountPath: /app/certs }
          readinessProbe:
            tcpSocket: { port: 8443 }
            initialDelaySeconds: 12
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sg1                    # admin/app/UI port (browser + consumer app)
spec:
  selector: { app: sg1 }
  ports: [{ port: 8081, targetPort: 8081 }]
---
apiVersion: v1
kind: Service
metadata:
  name: sg1-mtls              # gateway-to-gateway mutual-TLS message port
spec:
  selector: { app: sg1 }
  ports: [{ port: 8443, targetPort: 8443 }]
